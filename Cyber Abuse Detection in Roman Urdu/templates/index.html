<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Abuse Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: 'Segoe UI', sans-serif;
}

/* Top section */
.hero{
    text-align:center;
    color:white;
    margin-top:80px;
}

.hero h1{
    font-size:48px;
    font-weight:700;
}

.hero p{
    font-size:18px;
    opacity:0.9;
    max-width:600px;
    margin:auto;
}

/* Card */
.main-card{
    width:520px;
    border-radius:15px;
    margin:auto;
    margin-top:40px;
}

textarea{
    resize:none;
}

button{
    font-size:18px;
}

</style>

</head>

<body>

<!-- Title Section -->
<div class="hero">

<h1>Cyber Abuse Detection</h1>

<p>
An AI-powered system that analyzes Roman Urdu comments and detects
whether the text contains abusive or harmful language to promote
safer online communication.
</p>

</div>

<!-- Input Card -->
<div class="card shadow-lg p-4 main-card">

<form action="/predict" method="post">

<div class="mb-3">

<textarea name="comment"
class="form-control"
rows="4"
placeholder="Type Roman Urdu comment here..."></textarea>

</div>

<div class="d-grid">

<button class="btn btn-primary btn-lg">
Analyze Comment
</button>

</div>

</form>

{% if prediction %}

<div class="alert alert-info mt-4 text-center">

<strong>Prediction:</strong> {{ prediction }}

</div>

{% endif %}

</div>

</body>
</html>
